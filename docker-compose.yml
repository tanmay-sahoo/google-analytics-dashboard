services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "0.0.0.0:3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      HOSTNAME: 0.0.0.0
      # Web container does NOT run the worker — see the dedicated `worker` service below.
      START_WORKER: "false"
      # DATABASE_URL is read from the host .env file (compose substitutes ${DATABASE_URL}).
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3002/analytics-app}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY}
      CRON_SECRET: ${CRON_SECRET}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3002/analytics-app}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:3002/analytics-app/api/integrations/google/callback}
      GOOGLE_ADS_DEVELOPER_TOKEN: ${GOOGLE_ADS_DEVELOPER_TOKEN:-}
      GOOGLE_ADS_MANAGER_CUSTOMER_ID: ${GOOGLE_ADS_MANAGER_CUSTOMER_ID:-}
      GOOGLE_ADS_API_VERSION: ${GOOGLE_ADS_API_VERSION:-v20}
      # Tunables for response caching (seconds).
      GA4_REPORT_CACHE_TTL_SEC: ${GA4_REPORT_CACHE_TTL_SEC:-300}
      GA4_REALTIME_CACHE_TTL_SEC: ${GA4_REALTIME_CACHE_TTL_SEC:-30}
      ADS_REPORT_CACHE_TTL_SEC: ${ADS_REPORT_CACHE_TTL_SEC:-300}
      # How long an "active" (current-period) DB snapshot is reused before refetching from Google.
      REPORT_SNAPSHOT_FRESH_TTL_SEC: ${REPORT_SNAPSHOT_FRESH_TTL_SEC:-900}

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "scripts/ingestion-worker.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      APP_BASE_URL: http://app:3002/analytics-app
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3002/analytics-app}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY}
      CRON_SECRET: ${CRON_SECRET}
      # Ingestion concurrency tunables.
      INGEST_PROJECT_CONCURRENCY: ${INGEST_PROJECT_CONCURRENCY:-5}
      INGEST_INTER_CHUNK_DELAY_MS: ${INGEST_INTER_CHUNK_DELAY_MS:-250}
      ALERT_EVAL_INTERVAL_MS: ${ALERT_EVAL_INTERVAL_MS:-300000}
    depends_on:
      app:
        condition: service_started
